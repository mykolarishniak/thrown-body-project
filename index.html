<!DOCTYPE html>
<html lang="uk">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Моделювання руху тіла</title>
        <link rel="stylesheet" href="style.css">
        <script src="https://d3js.org/d3.v7.min.js"></script>
    </head>

    <body>
        <div class="main-container">
            <aside class="sidebar">
                <h2>Керування</h2>

                <div class="input-row">
                    <div class="input-group">
                        <label for="x0">x₀ (м):</label>
                        <input type="number" id="x0" value="0">
                    </div>
                    <div class="input-group">
                        <label for="y0">y₀ (м):</label>
                        <input type="number" id="y0" value="0">
                    </div>
                </div>

                <div class="input-group">
                    <label for="v0">Швидкість v₀ (м/с):</label>
                    <input type="number" id="v0" value="20" step="0.1">
                </div>
                <div class="input-group">
                    <label for="alpha">Кут α (градуси):</label>
                    <input type="number" id="alpha" value="45" min="-180" max="180">
                </div>

                <div class="input-group">
                    <label for="g">Прискорення g (м/с²):</label>
                    <input type="number" id="g" value="9.81" step="0.01">
                </div>

                <div class="input-group">
                    <label for="graphColor">Колір траєкторії:</label>
                    <input type="color" id="graphColor" value="#4a90e2">
                </div>

                <div class="button-group">
                    <button id="startBtn">Старт моделювання</button>
                    <button id="clearBtn" class="secondary">Очистити</button>
                </div>

                <div id="results" class="results-panel"></div>
            </aside>

            <main id="chart-container">
                <div id="chart"></div>
            </main>
        </div>
        <script src="script.js"></script>
    </body>

</html>
